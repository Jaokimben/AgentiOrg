# Netlify Configuration pour AgentiOrg
# Ce fichier configure automatiquement le déploiement sur Netlify

[build]
  # Commande de build
  command = "pnpm install && pnpm run pages:build"
  
  # Dossier de publication (output)
  publish = "dist/public"
  
  # Variables d'environnement de build
  [build.environment]
    NODE_VERSION = "20"
    PNPM_VERSION = "10.4.1"

# Redirections pour SPA (Single Page Application)
# Toutes les routes non trouvées → index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache des assets statiques (CSS, JS, images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Variables d'environnement à ajouter manuellement dans Netlify Dashboard :
# 
# OBLIGATOIRES :
#   DATABASE_URL
#   JWT_SECRET
#   VITE_APP_ID
#   OAUTH_SERVER_URL
#   VITE_OAUTH_PORTAL_URL
#   BUILT_IN_FORGE_API_URL
#   BUILT_IN_FORGE_API_KEY
#   VITE_FRONTEND_FORGE_API_URL
#   VITE_FRONTEND_FORGE_API_KEY
#   OWNER_OPEN_ID
#   OWNER_NAME
#
# OPTIONNELLES :
#   VITE_ANALYTICS_ENDPOINT
#   VITE_ANALYTICS_WEBSITE_ID
