# Cloudflare Pages Configuration
# This file configures a STATIC site deployment (no Workers)

# Project settings
[project]
name = "agentiorg"
compatibility_date = "2024-01-01"

# Build configuration
[build]
command = "pnpm install && pnpm run pages:build"
output_directory = "dist/public"

# Environment variables are set in Cloudflare Dashboard
# DO NOT define them here - they contain secrets
