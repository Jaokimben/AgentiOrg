# Cloudflare Pages Configuration
# Ce fichier est utilisé pour le déploiement via CLI : npx wrangler pages deploy

name = "agentiorg"
compatibility_date = "2024-01-01"

# ATTENTION : Pour Cloudflare Pages, il faut utiliser "pages" mode
# PAS de "main" entry point (c'est pour Workers uniquement)

# Configuration Pages : spécifier le dossier de sortie
# Usage CLI :
#   pnpm build
#   npx wrangler pages deploy dist/public --project-name=agentiorg

# Variables d'environnement à définir dans le Dashboard :
# https://dash.cloudflare.com → Workers & Pages → agentiorg → Settings → Environment variables
#
# OBLIGATOIRES :
#   NODE_VERSION = 20
#   DATABASE_URL = mysql://...
#   JWT_SECRET = ...
#   VITE_APP_ID = ...
#   OAUTH_SERVER_URL = https://api.manus.im
#   VITE_OAUTH_PORTAL_URL = https://auth.manus.im
#   BUILT_IN_FORGE_API_URL = ...
#   BUILT_IN_FORGE_API_KEY = ...
#   VITE_FRONTEND_FORGE_API_URL = ...
#   VITE_FRONTEND_FORGE_API_KEY = ...
#   OWNER_OPEN_ID = ...
#   OWNER_NAME = ...
#
# OPTIONNELLES :
#   VITE_ANALYTICS_ENDPOINT = ...
#   VITE_ANALYTICS_WEBSITE_ID = ...
